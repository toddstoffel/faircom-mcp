name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Strip leading 'v'

          # Use Python to safely update version in [project] section
          python3 - "$VERSION" << 'PYTHON_EOF'
          import sys
          import re

          version = sys.argv[1]
          with open('pyproject.toml', 'r') as f:
              content = f.read()

          # Find [project] section and replace version field
          # Match: [project] ... name = "faircom-mcp" ... version = "..."
          pattern = r'(\[project\][\s\S]*?name = "faircom-mcp"\s*)version = "[^"]*"'
          content = re.sub(pattern, rf'\1version = "{version}"', content, count=1)

          with open('pyproject.toml', 'w') as f:
              f.write(content)

          print(f"✓ Updated pyproject.toml to version {version}")

          # Verify the change
          with open('pyproject.toml', 'r') as f:
              for line in f:
                  if line.startswith('version ='):
                      print(f"✓ Verified: {line.strip()}")
                      break
          PYTHON_EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build -e .[dev]

      - name: Quality checks
        run: |
          python -m ruff check src tests
          python -m mypy src
          python -m pytest -m "not edge_integration"

      - name: Build Python distribution
        run: python -m build

      - name: Build container image
        run: docker build -t faircom-mcp:${{ github.ref_name }} .

      - name: Verify packaging layout
        run: make package-verify

      - name: Install package build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build DEB and RPM packages
        env:
          PACKAGE_BUILD_MODE: native
        run: make package-build

      - name: Inspect package metadata
        run: |
          dpkg-deb --info dist/packages/*.deb
          rpm -qip dist/packages/*.rpm

      - name: Validate package lifecycle
        run: make package-validate

      - name: Install integrity tooling
        run: python -m pip install cyclonedx-bom

      - name: Generate integrity artifacts
        run: make release-integrity

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: faircom-mcp-${{ github.ref_name }}
          path: |
            dist/*
            dist/packages/*
            dist/sbom.cdx.json
            dist/SHA256SUMS
            Dockerfile
            docker-compose.yml
            packaging/**

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/packages/*.deb
            dist/packages/*.rpm
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json
            dist/SHA256SUMS
