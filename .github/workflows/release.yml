name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build -e .[dev]

      - name: Quality checks
        run: |
          python -m ruff check src tests
          python -m mypy src
          python -m pytest -m "not edge_integration"

      - name: Build Python distribution
        run: python -m build

      - name: Build container image
        run: docker build -t faircom-mcp:${{ github.ref_name }} .

      - name: Verify packaging layout
        run: make package-verify

      - name: Install package build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build DEB and RPM packages
        run: make package-build

      - name: Inspect package metadata
        run: |
          dpkg-deb --info dist/packages/*.deb
          rpm -qip dist/packages/*.rpm

      - name: Validate package lifecycle
        run: make package-validate

      - name: Install integrity tooling
        run: python -m pip install cyclonedx-bom

      - name: Generate integrity artifacts
        run: make release-integrity

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: faircom-mcp-${{ github.ref_name }}
          path: |
            dist/*
            dist/packages/*
            dist/sbom.cdx.json
            dist/SHA256SUMS
            Dockerfile
            docker-compose.yml
            packaging/**
